# ===========================================================================
# Fly.io deploy config (alternative zero-cost host, scales to zero).
#
#   fly launch --no-deploy          # creates the app (edit name if taken)
#   fly postgres create             # free-allowance Postgres, then:
#   fly postgres attach <pg-app>    # sets DATABASE_URL secret automatically
#   fly secrets set JWT_SECRET=$(openssl rand -hex 48)
#   fly deploy
# ===========================================================================

app = "eduenterprise"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"
  PGSSL = "true"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
