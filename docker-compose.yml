
# ---------------------------------------------------------------------------
# EduEnterprise: GCSE Grade 9 Master Planner
# Multi-layer stack:  db (PostgreSQL)  ->  api (Node/Express)  ->  web (React/Nginx)
# Run everything with:   docker compose up --build
# ---------------------------------------------------------------------------

services:
  db:
    image: postgres:16-alpine
    container_name: edu_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edu_secret}
      POSTGRES_DB: ${POSTGRES_DB:-eduenterprise}
    volumes:
      - db_data:/var/lib/postgresql/data
      # Schema is applied by the API on boot (backend/src/schema.sql via migrate.js),
      # so local and cloud stay identical — no init-SQL mount needed.
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edu} -d ${POSTGRES_DB:-eduenterprise}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - edu_net

  api:
    build:
      context: ./backend
    container_name: edu_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-edu}:${POSTGRES_PASSWORD:-edu_secret}@db:5432/${POSTGRES_DB:-eduenterprise}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_please}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8088}
      # Email: Resend API (primary) -> SMTP (fallback) -> dev log
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-EduEnterprise <onboarding@resend.dev>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-EduEnterprise <no-reply@eduenterprise.local>}
      # AI keys (Groq primary, Gemini fallback)
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
    ports:
      - "${API_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edu_net

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: edu_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"
    networks:
      - edu_net

volumes:
  db_data:

networks:
  edu_net:
    driver: bridge
