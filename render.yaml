# ===========================================================================
# Render Blueprint — one-click, zero-cost deploy.
# In Render: New → Blueprint → point at this repo. It provisions a free
# Postgres and a free Docker web service (API + bundled SPA, single origin).
#
# Note: Render's free Postgres is time-limited. For an always-free database,
# create a Neon project instead and set DATABASE_URL manually (remove the
# `databases:` block and the fromDatabase reference). See docs/DEPLOYMENT.md.
# ===========================================================================

databases:
  - name: edu-db
    plan: free
    databaseName: eduenterprise
    user: edu

services:
  - type: web
    name: eduenterprise
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: edu-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true      # Render generates a strong secret
      - key: NODE_ENV
        value: production
      - key: PGSSL
        value: "true"
      - key: PORT
        value: "4000"
